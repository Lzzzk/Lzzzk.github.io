<body>

<div class="first">

						</br>

			position: relative;

		}

		.second {
			position: relative;
			top: 180px;

		.last {
			position: relative;
			left: 280px;
			top: 100px;
		}

		p {
			font-family: Georgia;
			color: #FFFF00;

		h1 {
			width: 5em;

			background: #FFFF00;

		}

		input {
			background: transparent;

	<script>
		var audio1 = new Audio("1.mp3")

		function controlMusic1() {
			if (audio1.paused) {
				audio1.play();
				$('#img1').attr('src', "1-2.gif")

			} else {
				audio1.pause();
				$('#img1').attr('src', "1-1.png")

			}
			img1 = !img1
		}

		function CHECK1() {
			var a = document.getElementById("answer1").value;
			if (a == "木星" || a == "Jupiter" || a == "jupiter") {
				alert("Right! It's Jupiter.")
				$('#img1').attr('src', "1-end.png")
				$("#main1").fadeOut(2000)
				$("#img1").removeAttr('onclick')
				audio1.pause()
				// setTimeout(()=>{},1000)

			} else {
				alert("You are wrong, listen again. It comes from  the largest planet in the solar system.")

			}
		}



		var audio2 = new Audio("2.mp3")

		function controlMusic2() {
			if (audio2.paused) {
				audio2.play();
				$('#img2').attr('src', "2-2.gif")

			} else {
				audio2.pause();
				$('#img2').attr('src', "2-1.png")

			}
			img2 = !img2
		}

		function CHECK2() {

			var b = document.getElementById("answer2").value;
			if (b == "天王星" || b == "Neptune" || b == "neptune") {
				alert("Right! It's Neptune.")
				$('#img2').attr('src', "2-end.png")
				$("#main2").fadeOut(2000)
				$("#img2").removeAttr('onclick')
				audio2.pause()
				// setTimeout(()=>{},1000)


			} else {
				alert("You are wrong, listen again. It's a lonely planet.")

			}
		}



		var audio3 = new Audio("3.mp3")

		function controlMusic3() {
			if (audio3.paused) {
				audio3.play();
				$('#img3').attr('src', "3-2.gif")

			} else {
				audio3.pause();
				$('#img3').attr('src', "3-1.png")

			}
			img3 = !img3
		}

		function CHECK3() {

			var c = document.getElementById("answer3").value;
			if (c == "地球" || c == "Earth" || c == "earth") {
				alert("Right! It comes from the planet under your feet.")
				$('#img3').attr('src', "3-end.png")
				$("#main3").fadeOut(2000)
				$("#img3").removeAttr('onclick')
				audio3.pause()
				// setTimeout(()=>{},1000)
			} else {
				alert("You are wrong, listen again. You should be familiar with it.")
			}
		}
	</script>
