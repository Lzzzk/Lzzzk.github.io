<!doctype html>
<html lang="en">

<head>
  <!-- Required meta tags -->
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CSS Positioning</title>
  <!-- 动效JavaScript 文件 -->
  <script src="https://code.jquery.com/jquery-3.3.1.slim.min.js" integrity="sha384-q8i/X+965DzO0rT7abK41JStQIAqVgRVzpbzo5smXKp4YfRvH+8abtTE1Pi6jizo" crossorigin="anonymous"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js" integrity="sha384-UO2eT0CpHqdSJQ6hJty5KVphtPhzWj9WO1clHTMGa3JDZwrnQq4sF86dIHNDz0W1" crossorigin="anonymous"></script>
  <!-- 国内 Staticfile CDN 上的 Bootstrap5 核心 JavaScript 文件 -->
  <script src="https://cdn.staticfile.org/twitter-bootstrap/5.1.1/js/bootstrap.min.js"></script>
  <!-- 国内 Staticfile CDN 上的 Bootstrap5 核心 CSS 文件 -->
  <link rel="stylesheet" href="https://cdn.staticfile.org/twitter-bootstrap/5.1.1/css/bootstrap.min.css">
  <style type="text/css">
    body {
      background-color: black;

    }

    .text {
      font-size: 120px;

    }

    .start {
      width: 700px;
      height: 350px;
      background: transparent url(./img1/1.png) 0 0 no-repeat;
  cursor:url('./img1/clink.png'), default;
    }


    .start:hover {
      animation: name 3s steps(46) infinite;

    }

    .container {
      width: 100%;
      height: 100vh;
      position: relative;
      justify-content: center;
      display: flex;
      align-items: center;
    }


    .text {
      width: 99%;
      word-break: break-130;
      justify-content: center;
      text-align: center;
      align-items: center;
      font-family: Agrandir-MediumC4-o;
      color: #fff;
      position: absolute;
      line-height: 0.9;
    }

    .name {
      width: 100%;
      height: 100%;
      display: flex;
      position: absolute;
      justify-content: center;
      align-items: center;
      z-index: 1;
      mix-blend-mode: difference;

    }



    @keyframes name {
      from {
        background-position: 0 0;
      }

      to {
        background-position: 0 -16100px;
      }
    }



    @media screen and (max-width: 1080px) {
      body {
        background-color: #e52387;
      }

      .text {
        font-size: 90px;


      }
    }

    @media screen and (max-width: 768px) {
      body {
        background-color: black;
      }

      .text {
        font-size: 60px;

      }
      .start {
        width: 400px;
        height: 200px;
        background: transparent url(./img1/2.png) 0 0 no-repeat;
    cursor:url('./img1/clink.png'), default;
      }


      .start:hover {
        animation: name 3s steps(46) infinite;

      }

      @keyframes name {
        from {
          background-position: 0 0;
        }

        to {
          background-position: 0 -9200px;
        }
      }
    }


    @media screen and (max-width: 550px) {
      body {
        background-color: black;
      }

      .text {
        color:  #e52387;
        font-size: 30px;
margin-bottom: 200px;
margin-left: 100px;
text-align:left;
line-height: 4;
      }



      .name {

        margin-top: 150px;
      }


    }




  </style>
  <title>Hello, world!</title>
</head>

<body>
  <div class="container">

    <div class="name">
      <div class="start" onclick="window.location.href='1.html';return false"></div>
    </div>
      <div class="text">Lzzż </br>丨Graphic丨</br>丨Art丨</br>丨Phtotgraphy丨 </div>

  </div>
