<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <title>CSS Positioning</title>

</head>

<body>

  <div class="container">
    <div class="name">
      <div class="start" onclick="window.location.href='1.html';return false"></div>
    </div>
  </div>





  <style type="text/css">
    body {
      background-color: black;
    }



    .container {
      width: 100%;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }





    .name {
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
    }

    .start {
      width: 700px;
      height: 350px;
      background: transparent url(./img1/1.png) 0 0 no-repeat;
    }


    .start:hover {
      animation: name 3s steps(46) infinite;
    }



    @keyframes name {
      from {
        background-position: 0 0;
      }

      to {
        background-position: 0 -16100px;
      }
    }
  </style>

  <!-- <script>

  }
  </script> -->

</body>

</html>
